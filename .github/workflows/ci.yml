name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Validate bake file
        run: docker buildx bake --file docker-bake.hcl --print

      - name: Build go runtime
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: images/go-runtime/Dockerfile
          push: false

      - name: Build go builder
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: images/go-builder/Dockerfile
          push: false
