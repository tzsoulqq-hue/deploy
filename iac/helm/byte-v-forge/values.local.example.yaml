global:
  imageRegistry: registry.example.internal/byte-v-forge
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

configEnv:
  MAILBOX_CLOUDFLARE_MAX_MESSAGES_PER_DOMAIN: "500"
  MAILBOX_OUTLOOK_MAX_MESSAGES_PER_MAILBOX: "100"

mailboxOutboundWebhooks:
  - name: gpt-service
    url: 'http://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "gpt-service") }}:8081/webhooks/mailbox/email'
    tokenEnv: GPT_MAILBOX_WEBHOOK_TOKEN
    filter:
      senderDomains:
        - openai.com
      recipientDomains:
        - example.invalid
    includeBody: true
    previewLimit: 1000

cloudflareEmail:
  zones:
    - zoneName: example.invalid
      enabled: true
      workerName: cloudflare-email-relay
      catchAllEnabled: true

workloads:
  cloudflare-tunnel:
    enabled: false
  gpt-service:
    image:
      repository: gpt-service
      tag: dev
  mailbox:
    image:
      repository: mailbox
      tag: dev
  browser-automation:
    image:
      repository: browser-automation
      tag: dev
  workflow-runtime:
    image:
      repository: workflow-runtime
      tag: dev
  proxy-runtime:
    image:
      repository: proxy-runtime
      tag: dev
  sms-service:
    image:
      repository: sms-service
      tag: dev
  webui:
    image:
      repository: webui
      tag: dev

ingress:
  webui:
    enabled: true
    className: nginx
    hosts:
      - host: byte-v-forge.example.internal
        paths:
          - path: /
            pathType: Prefix
  webhook:
    enabled: true
    className: nginx
    hosts:
      - host: webhook.byte-v-forge.example.internal
        paths:
          - path: /webhooks/email
            pathType: Prefix
            component: mailbox
            portName: http-webhook
          - path: /
            pathType: Prefix
            component: gpt-service
            portName: http-webhook

secrets:
  stringData:
    POSTGRES_PASSWORD: change-me
    BROWSER_AUTOMATION_PROXY_REFS_JSON: '{"register":"socks5://proxy.internal:10813","outlook":"socks5://proxy.internal:10810"}'
    MAILBOX_WEBHOOK_TOKEN: change-me
    GPT_MAILBOX_WEBHOOK_TOKEN: change-me
    MAILBOX_CLOUDFLARE_API_TOKEN: change-me
    CLOUDFLARE_TUNNEL_TOKEN: change-me
    GOPAY_DYNAMIC_EGRESS: 'socks5://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:10811'
    GOPAY_CHECKOUT_PROXY_URL: 'socks5://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:10812'
    GOPAY_PAYMENT_PROXY_URL: 'socks5://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:10811'
    CODEX_OAUTH_TOKEN_PROXY_URL: 'socks5://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:10810'
    CODEX_OAUTH_PROTOCOL_PROXY_URL: 'socks5://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:10810'
    GOTO_SSO_CLIENT_SECRET: ""
    GOPAY_ADD_BALANCE_ENVELOPE_LINK: ""
    GOPAY_ADD_BALANCE_TRANSFER_INSTRUCTIONS: ""
    PROXY_RUNTIME_1024_USERNAME: change-me
    PROXY_RUNTIME_1024_PASSWORD: change-me
    PROXY_RUNTIME_1024_SESSION_ID: change-me
    PROXY_RUNTIME_STATIC_CHAIN: ""
