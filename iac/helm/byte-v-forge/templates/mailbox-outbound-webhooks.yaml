apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "byte-v-forge.fullname" . }}-mailbox-outbound-webhooks
  labels:
    {{- include "byte-v-forge.labels" . | nindent 4 }}
data:
  webhooks.json: |
{{- $webhooks := list }}
{{- range .Values.mailboxOutboundWebhooks }}
{{- $hook := deepCopy . }}
{{- if hasKey $hook "url" }}
{{- $_ := set $hook "url" (tpl (toString (get $hook "url")) $) }}
{{- end }}
{{- $webhooks = append $webhooks $hook }}
{{- end }}
{{- $config := dict "webhooks" $webhooks }}
{{ toJson $config | nindent 4 }}
