{{- $mailbox := index .Values.workloads "mailbox" -}}
{{- if $mailbox.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "byte-v-forge.fullname" . }}-cloudflare-email
  labels:
    {{- include "byte-v-forge.labels" . | nindent 4 }}
data:
  cloudflare-email.json: |
{{ toJson .Values.cloudflareEmail | nindent 4 }}
{{- end }}
