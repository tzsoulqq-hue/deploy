{{- $webui := index .Values.workloads "webui" -}}
{{- if and $webui.enabled .Values.dashboard.serviceStatus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "byte-v-forge.componentFullname" (dict "root" . "component" "webui-dashboard") }}
  labels:
    {{- include "byte-v-forge.componentLabels" (dict "root" . "component" "webui-dashboard") | nindent 4 }}
data:
  service-status.textproto: |
    {{- range .Values.dashboard.serviceStatus.services }}
    services {
      name: {{ .name | quote }}
      kind: {{ .kind }}
      target: {{ tpl .target $ | quote }}
      {{- with .method }}
      method: {{ . | quote }}
      {{- end }}
      {{- with .timeoutMs }}
      timeout_ms: {{ . }}
      {{- end }}
    }
    {{- end }}
{{- end }}
