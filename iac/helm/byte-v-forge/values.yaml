global:
  imageRegistry: ""
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

configEnv:
  BROWSER_AUTOMATION_APPLY_MIGRATIONS: "true"
  BROWSER_AUTOMATION_RUNTIME: camoufox
  WORKFLOW_RUNTIME_NAMESPACE: default
  GPT_WORKFLOW_RUNTIME_TASK_QUEUE: byte-v-forge-gpt-service
  MAILBOX_WORKFLOW_RUNTIME_TASK_QUEUE: byte-v-forge-mailbox-service
  MAILBOX_WEBHOOK_HTTP_ADDR: ":8082"
  MAILBOX_CLOUDFLARE_MAX_MESSAGES_PER_DOMAIN: "500"
  MAILBOX_OUTLOOK_MAX_MESSAGES_PER_MAILBOX: "100"

dashboard:
  serviceStatus:
    enabled: true
    services:
      - name: gpt
        kind: DASHBOARD_SERVICE_PROBE_TCP
        target: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "gpt-service") }}:50051'
        timeoutMs: 1500
      - name: mailbox
        kind: DASHBOARD_SERVICE_PROBE_TCP
        target: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "mailbox") }}:50051'
        timeoutMs: 1500
      - name: sms
        kind: DASHBOARD_SERVICE_PROBE_TCP
        target: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "sms-service") }}:50051'
        timeoutMs: 1500
      - name: workflow-runtime
        kind: DASHBOARD_SERVICE_PROBE_HTTP
        target: 'http://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "workflow-runtime") }}:8080/healthz'
        timeoutMs: 1500
      - name: proxy-runtime
        kind: DASHBOARD_SERVICE_PROBE_HTTP
        target: 'http://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:8080/healthz'
        timeoutMs: 1500

mailboxOutboundWebhooks:
  - name: gpt-service
    url: 'http://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "gpt-service") }}:8081/webhooks/mailbox/email'
    tokenEnv: GPT_MAILBOX_WEBHOOK_TOKEN
    filter:
      senderDomains:
        - openai.com
    includeBody: true
    previewLimit: 1000

cloudflareEmail:
  zones: []

secrets:
  create: true
  name: ""
  stringData:
    POSTGRES_PASSWORD: byte_v_forge
    BROWSER_AUTOMATION_PROXY_REFS_JSON: '{"register":"socks5://proxy.internal:10813","outlook":"socks5://proxy.internal:10810"}'
    MAILBOX_WEBHOOK_TOKEN: ""
    GPT_MAILBOX_WEBHOOK_TOKEN: ""
    MAILBOX_CLOUDFLARE_API_TOKEN: ""
    CLOUDFLARE_TUNNEL_TOKEN: ""
    GOPAY_DYNAMIC_EGRESS: 'socks5://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:10811'
    GOPAY_CHECKOUT_PROXY_URL: 'socks5://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:10812'
    GOPAY_PAYMENT_PROXY_URL: 'socks5://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:10811'
    CODEX_OAUTH_TOKEN_PROXY_URL: 'socks5://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:10812'
    CODEX_OAUTH_PROTOCOL_PROXY_URL: 'socks5://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:10812'
    GOTO_SSO_CLIENT_SECRET: ""
    GOPAY_ADD_BALANCE_ENVELOPE_LINK: ""
    GOPAY_ADD_BALANCE_TRANSFER_INSTRUCTIONS: ""
    PROXY_RUNTIME_1024_USERNAME: ""
    PROXY_RUNTIME_1024_PASSWORD: ""
    PROXY_RUNTIME_1024_SESSION_ID: ""
    PROXY_RUNTIME_STATIC_CHAIN: ""

postgres:
  enabled: true
  image:
    repository: docker.m.daocloud.io/library/postgres
    tag: 15-alpine
  auth:
    user: byte_v_forge
    database: byte_v_forge
  service:
    port: 5432
  sslMode: disable
  external:
    host: ""
    port: 5432
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 20Gi
  resources: {}

workflowRuntimeEngine:
  enabled: true
  image:
    repository: docker.m.daocloud.io/temporalio/auto-setup
    tag: 1.29.2
  service:
    port: 7233
  database: workflow_runtime
  visibilityDatabase: workflow_runtime_visibility
  resources: {}

ingress:
  webui:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: byte-v-forge.local
        paths:
          - path: /
            pathType: Prefix
    tls: []
  webhook:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: webhook.byte-v-forge.local
        paths:
          - path: /webhooks/email
            pathType: Prefix
            component: mailbox
            portName: http-webhook
          - path: /
            pathType: Prefix
            component: gpt-service
            portName: http-webhook
    tls: []

workloads:
  cloudflare-tunnel:
    enabled: false
    replicas: 1
    image:
      repository: docker.m.daocloud.io/cloudflare/cloudflared
      tag: 2026.5.0
    command:
      - cloudflared
      - tunnel
      - --no-autoupdate
      - --loglevel
      - info
      - --metrics
      - 0.0.0.0:2000
      - run
    secretEnv:
      - name: TUNNEL_TOKEN
        key: CLOUDFLARE_TUNNEL_TOKEN
    ports:
      - name: metrics
        containerPort: 2000
    probes:
      httpGet:
        path: /ready
        port: metrics
      initialDelaySeconds: 10
      periodSeconds: 10
      livenessInitialDelaySeconds: 10
      livenessPeriodSeconds: 10
    resources: {}

  workflow-runtime:
    enabled: true
    replicas: 1
    image:
      repository: byte-v-forge/workflow-runtime
      tag: latest
    env:
      WORKFLOW_RUNTIME_LISTEN_ADDR: ":7233"
      WORKFLOW_RUNTIME_BACKEND_ADDR: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "workflow-runtime-engine") }}:7233'
      WORKFLOW_RUNTIME_HEALTH_ADDR: ":8080"
      WORKFLOW_RUNTIME_DIAL_TIMEOUT_SECONDS: "5"
    ports:
      - name: grpc
        containerPort: 7233
      - name: health
        containerPort: 8080
    service:
      enabled: true
      type: ClusterIP
      ports:
        - name: grpc
          port: 7233
          targetPort: grpc
        - name: health
          port: 8080
          targetPort: health
    probes:
      httpGet:
        path: /healthz
        port: health
    resources: {}

  proxy-runtime:
    enabled: true
    replicas: 1
    image:
      repository: byte-v-forge/proxy-runtime
      tag: latest
    env:
      PROXY_RUNTIME_ADDR: ":8080"
      PROXY_RUNTIME_LISTENERS_JSON: '[{"id":"direct-egress","addr":":10810","protocol":"socks5","route":"upstream","upstream":"tcp://192.168.122.1:10810"},{"id":"dynamic-provider","addr":":10811","protocol":"socks5","route":"provider"},{"id":"checkout-egress","addr":":10812","protocol":"socks5","route":"upstream","upstream":"tcp://192.168.122.1:10813"}]'
      PROXY_RUNTIME_LOCAL_PROTOCOL: socks5
      PROXY_RUNTIME_PROVIDER: 1024proxy
      PROXY_RUNTIME_1024_PROXY_ADDR: us.1024proxy.io:3000
      PROXY_RUNTIME_1024_PROTOCOL: socks5
      PROXY_RUNTIME_1024_REGION: ID
      PROXY_RUNTIME_1024_STICKY_MINUTES: "10"
    secretEnv:
      - name: PROXY_RUNTIME_STATIC_CHAIN
        key: PROXY_RUNTIME_STATIC_CHAIN
      - name: PROXY_RUNTIME_1024_USERNAME
        key: PROXY_RUNTIME_1024_USERNAME
      - name: PROXY_RUNTIME_1024_PASSWORD
        key: PROXY_RUNTIME_1024_PASSWORD
      - name: PROXY_RUNTIME_1024_SESSION_ID
        key: PROXY_RUNTIME_1024_SESSION_ID
    ports:
      - name: http
        containerPort: 8080
      - name: common-socks
        containerPort: 10810
      - name: dynamic-socks
        containerPort: 10811
      - name: checkout-socks
        containerPort: 10812
    service:
      enabled: true
      type: ClusterIP
      ports:
        - name: http
          port: 8080
          targetPort: http
        - name: common-socks
          port: 10810
          targetPort: common-socks
        - name: dynamic-socks
          port: 10811
          targetPort: dynamic-socks
        - name: checkout-socks
          port: 10812
          targetPort: checkout-socks
    probes:
      httpGet:
        path: /healthz
        port: http
    resources: {}

  browser-automation:
    enabled: true
    replicas: 1
    strategyType: Recreate
    image:
      repository: byte-v-forge/browser-automation
      tag: latest
    postgresEnv: true
    env:
      BROWSER_AUTOMATION_LISTEN_ADDR: ":50051"
      BROWSER_AUTOMATION_POSTGRES_DSN: '{{ include "byte-v-forge.pgDsn" . }}'
      BROWSER_AUTOMATION_APPLY_MIGRATIONS: '{{ .Values.configEnv.BROWSER_AUTOMATION_APPLY_MIGRATIONS }}'
      BROWSER_AUTOMATION_RUNTIME: '{{ .Values.configEnv.BROWSER_AUTOMATION_RUNTIME }}'
    secretEnv:
      - name: BROWSER_AUTOMATION_PROXY_REFS_JSON
        key: BROWSER_AUTOMATION_PROXY_REFS_JSON
    ports:
      - name: grpc
        containerPort: 50051
    service:
      enabled: true
      type: ClusterIP
      ports:
        - name: grpc
          port: 50051
          targetPort: grpc
    probes:
      tcpSocketPort: grpc
    volumeMounts:
      - name: shm
        mountPath: /dev/shm
    volumes:
      - name: shm
        type: emptyDir
        medium: Memory
        sizeLimit: 2Gi
    resources:
      limits:
        memory: 4Gi

  mailbox:
    enabled: true
    replicas: 1
    image:
      repository: byte-v-forge/mailbox
      tag: latest
    postgresEnv: true
    env:
      MAILBOX_LISTEN_ADDR: ":50051"
      MAILBOX_WEBHOOK_HTTP_ADDR: '{{ .Values.configEnv.MAILBOX_WEBHOOK_HTTP_ADDR }}'
      MAILBOX_OUTBOUND_WEBHOOKS_FILE: /etc/mailbox/outbound-webhooks/webhooks.json
      MAILBOX_CLOUDFLARE_EMAIL_CONFIG_FILE: /etc/mailbox/cloudflare-email/cloudflare-email.json
      MAILBOX_CLOUDFLARE_MAX_MESSAGES_PER_DOMAIN: '{{ .Values.configEnv.MAILBOX_CLOUDFLARE_MAX_MESSAGES_PER_DOMAIN }}'
      MAILBOX_OUTLOOK_MAX_MESSAGES_PER_MAILBOX: '{{ .Values.configEnv.MAILBOX_OUTLOOK_MAX_MESSAGES_PER_MAILBOX }}'
      MAILBOX_PG_DSN: '{{ include "byte-v-forge.pgDsn" . }}'
      BROWSER_AUTOMATION_ADDR: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "browser-automation") }}:50051'
      WORKFLOW_RUNTIME_ADDRESS: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "workflow-runtime") }}:7233'
      WORKFLOW_RUNTIME_NAMESPACE: '{{ .Values.configEnv.WORKFLOW_RUNTIME_NAMESPACE }}'
      WORKFLOW_RUNTIME_TASK_QUEUE: '{{ .Values.configEnv.MAILBOX_WORKFLOW_RUNTIME_TASK_QUEUE }}'
      WORKFLOW_RUNTIME_IDENTITY: mailbox
    secretEnv:
      - name: MAILBOX_WEBHOOK_TOKEN
        key: MAILBOX_WEBHOOK_TOKEN
      - name: GPT_MAILBOX_WEBHOOK_TOKEN
        key: GPT_MAILBOX_WEBHOOK_TOKEN
      - name: MAILBOX_CLOUDFLARE_API_TOKEN
        key: MAILBOX_CLOUDFLARE_API_TOKEN
    volumeMounts:
      - name: outbound-webhooks
        mountPath: /etc/mailbox/outbound-webhooks
        readOnly: true
      - name: cloudflare-email
        mountPath: /etc/mailbox/cloudflare-email
        readOnly: true
    volumes:
      - name: outbound-webhooks
        type: configMap
        configMapName: '{{ include "byte-v-forge.fullname" . }}-mailbox-outbound-webhooks'
      - name: cloudflare-email
        type: configMap
        configMapName: '{{ include "byte-v-forge.fullname" . }}-cloudflare-email'
    ports:
      - name: grpc
        containerPort: 50051
      - name: http-webhook
        containerPort: 8082
    service:
      enabled: true
      type: ClusterIP
      ports:
        - name: grpc
          port: 50051
          targetPort: grpc
        - name: http-webhook
          port: 8082
          targetPort: http-webhook
    probes:
      tcpSocketPort: grpc
    resources: {}

  gpt-service:
    enabled: true
    replicas: 1
    image:
      repository: byte-v-forge/gpt-service
      tag: latest
    postgresEnv: true
    env:
      GPT_SERVICE_LISTEN_ADDR: ":50051"
      GPT_ACCOUNT_INTERNAL_ADDR: "127.0.0.1:50052"
      GPT_GOPAY_PAYMENT_INTERNAL_ADDR: "127.0.0.1:50054"
      GPT_GOPAY_APP_INTERNAL_PORT: "50060"
      GPT_SERVICE_PG_DSN: '{{ include "byte-v-forge.pgDsn" . }}'
      BROWSER_AUTOMATION_ADDR: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "browser-automation") }}:50051'
      SMS_ADDR: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "sms-service") }}:50051'
      MAILBOX_ADDR: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "mailbox") }}:50051'
      CODEX_OAUTH_CLIENT_ID: app_EMoamEEZ73f0CkXaXp7hrann
      CODEX_OAUTH_REDIRECT_URI: http://localhost:1455/auth/callback
      CODEX_OAUTH_AUTH_URL: https://auth.openai.com/oauth/authorize
      CODEX_OAUTH_TOKEN_URL: https://auth.openai.com/oauth/token
      CODEX_OAUTH_PROTOCOL_TLS_PROFILE: chrome_146
      CODEX_OAUTH_PROTOCOL_SESSION_DUMP_ENABLED: "true"
      CODEX_OAUTH_SCOPE: openid profile email offline_access api.connectors.read api.connectors.invoke
      CODEX_OAUTH_PHONE_PROFILE_KEY: openai-th
      CODEX_OAUTH_PHONE_MAX_REUSE_COUNT: "3"
      CODEX_OAUTH_PHONE_LABEL: codex-oauth-add-phone
      CODEX_OAUTH_PHONE_COUNTRY_ISO2: TH
      CODEX_OAUTH_PHONE_COUNTRY_CALLING_CODE: "66"
      CODEX_OAUTH_PHONE_MAX_PRICE_USD: "0.068"
      CODEX_OAUTH_PHONE_FIRST_WAIT_SECONDS: "60"
      CODEX_OAUTH_PHONE_RESEND_WAIT_SECONDS: "60"
      CODEX_OAUTH_PHONE_MIN_REUSE_REMAINING_SECONDS: "180"
      WORKFLOW_RUNTIME_ADDRESS: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "workflow-runtime") }}:7233'
      WORKFLOW_RUNTIME_NAMESPACE: '{{ .Values.configEnv.WORKFLOW_RUNTIME_NAMESPACE }}'
      WORKFLOW_RUNTIME_TASK_QUEUE: '{{ .Values.configEnv.GPT_WORKFLOW_RUNTIME_TASK_QUEUE }}'
      WORKFLOW_RUNTIME_IDENTITY: gpt-service
      PROXY_RUNTIME_HTTP_ADDR: 'http://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:8080'
      GOPAY_SIGNUP_INITIATE_JITTER_MIN_SECONDS: "8"
      GOPAY_SIGNUP_INITIATE_JITTER_MAX_SECONDS: "25"
      GOPAY_SIGNUP_RATE_LIMIT_COOLDOWN_SECONDS: "900"
    secretEnv:
      - name: GPT_MAILBOX_WEBHOOK_TOKEN
        key: GPT_MAILBOX_WEBHOOK_TOKEN
      - name: GOPAY_DYNAMIC_EGRESS
        key: GOPAY_DYNAMIC_EGRESS
      - name: GOPAY_CHECKOUT_PROXY_URL
        key: GOPAY_CHECKOUT_PROXY_URL
      - name: GOPAY_PAYMENT_PROXY_URL
        key: GOPAY_PAYMENT_PROXY_URL
      - name: CODEX_OAUTH_TOKEN_PROXY_URL
        key: CODEX_OAUTH_TOKEN_PROXY_URL
      - name: CODEX_OAUTH_PROTOCOL_PROXY_URL
        key: CODEX_OAUTH_PROTOCOL_PROXY_URL
      - name: GOTO_SSO_CLIENT_SECRET
        key: GOTO_SSO_CLIENT_SECRET
      - name: GOPAY_ADD_BALANCE_ENVELOPE_LINK
        key: GOPAY_ADD_BALANCE_ENVELOPE_LINK
      - name: GOPAY_ADD_BALANCE_TRANSFER_INSTRUCTIONS
        key: GOPAY_ADD_BALANCE_TRANSFER_INSTRUCTIONS
    ports:
      - name: grpc
        containerPort: 50051
      - name: account-grpc
        containerPort: 50052
      - name: payment-grpc
        containerPort: 50054
      - name: http-webhook
        containerPort: 8081
    service:
      enabled: true
      type: ClusterIP
      ports:
        - name: grpc
          port: 50051
          targetPort: grpc
        - name: account-grpc
          port: 50052
          targetPort: account-grpc
        - name: payment-grpc
          port: 50054
          targetPort: payment-grpc
        - name: http-webhook
          port: 8081
          targetPort: http-webhook
    probes:
      tcpSocketPort: grpc
    resources: {}

  sms-service:
    enabled: true
    replicas: 1
    image:
      repository: byte-v-forge/sms-service
      tag: latest
    postgresEnv: true
    env:
      SMS_LISTEN_ADDR: ":50051"
      SMS_PG_DSN: '{{ include "byte-v-forge.pgDsn" . }}'
    ports:
      - name: grpc
        containerPort: 50051
    service:
      enabled: true
      type: ClusterIP
      ports:
        - name: grpc
          port: 50051
          targetPort: grpc
    probes:
      tcpSocketPort: grpc
    resources: {}

  webui:
    enabled: true
    replicas: 1
    image:
      repository: byte-v-forge/webui
      tag: latest
    env:
      LISTEN_ADDR: ":8080"
      GPT_ACCOUNT_ADDR: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "gpt-service") }}:50052'
      GPT_WORKFLOW_ADDR: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "gpt-service") }}:50051'
      GPT_PAYMENT_ADDR: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "gpt-service") }}:50054'
      MAILBOX_ADDR: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "mailbox") }}:50051'
      SMS_ADDR: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "sms-service") }}:50051'
      PROXY_RUNTIME_HTTP_ADDR: 'http://{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "proxy-runtime") }}:8080'
      DASHBOARD_SERVICE_STATUS_CONFIG_FILE: /etc/webui/dashboard/service-status.textproto
    ports:
      - name: http
        containerPort: 8080
    service:
      enabled: true
      type: ClusterIP
      ports:
        - name: http
          port: 8080
          targetPort: http
    probes:
      httpGet:
        path: /api/health
        port: http
    volumeMounts:
      - name: dashboard-service-status
        mountPath: /etc/webui/dashboard
        readOnly: true
    volumes:
      - name: dashboard-service-status
        type: configMap
        configMapName: '{{ include "byte-v-forge.componentFullname" (dict "root" . "component" "webui-dashboard") }}'
    resources: {}
