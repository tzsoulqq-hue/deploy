name: byte-v-forge

services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-byte_v_forge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-byte_v_forge}
      - POSTGRES_DB=${POSTGRES_DB:-byte_v_forge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  workflow-runtime-engine:
    image: docker.m.daocloud.io/temporalio/auto-setup:1.29.2
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-byte_v_forge}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-byte_v_forge}
      - POSTGRES_SEEDS=postgres
      - DBNAME=workflow_runtime
      - VISIBILITY_DBNAME=workflow_runtime_visibility
    depends_on:
      postgres:
        condition: service_started
    restart: always

  workflow-runtime:
    build:
      context: ../workflow-runtime
      dockerfile: Dockerfile
    ports:
      - "${WORKFLOW_RUNTIME_PORT:-7233}:7233"
    environment:
      - WORKFLOW_RUNTIME_LISTEN_ADDR=:7233
      - WORKFLOW_RUNTIME_BACKEND_ADDR=workflow-runtime-engine:7233
      - WORKFLOW_RUNTIME_HEALTH_ADDR=:8080
      - WORKFLOW_RUNTIME_DIAL_TIMEOUT_SECONDS=5
    depends_on:
      - workflow-runtime-engine
    restart: always

  proxy-runtime:
    build:
      context: ../proxy-runtime
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${PROXY_RUNTIME_HTTP_PORT:-8083}:8080"
      - "${PROXY_RUNTIME_COMMON_EGRESS_PORT:-10810}:10810"
      - "${PROXY_RUNTIME_DYNAMIC_EGRESS_PORT:-10811}:10811"
      - "${PROXY_RUNTIME_CHECKOUT_EGRESS_PORT:-10812}:10812"
    environment:
      - PROXY_RUNTIME_ADDR=:8080
      - PROXY_RUNTIME_LISTENERS_JSON=${PROXY_RUNTIME_LISTENERS_JSON:-[{"id":"direct-egress","addr":":10810","protocol":"socks5","route":"upstream","upstream":"tcp://host.docker.internal:10810"},{"id":"dynamic-provider","addr":":10811","protocol":"socks5","route":"provider"},{"id":"checkout-egress","addr":":10812","protocol":"socks5","route":"upstream","upstream":"tcp://host.docker.internal:10813"}]}
      - PROXY_RUNTIME_LOCAL_PROTOCOL=socks5
      - PROXY_RUNTIME_STATIC_CHAIN=${PROXY_RUNTIME_STATIC_CHAIN:-}
      - PROXY_RUNTIME_PROVIDER=1024proxy
      - PROXY_RUNTIME_1024_PROXY_ADDR=${PROXY_RUNTIME_1024_PROXY_ADDR:-us.1024proxy.io:3000}
      - PROXY_RUNTIME_1024_PROTOCOL=socks5
      - PROXY_RUNTIME_1024_REGION=${PROXY_RUNTIME_1024_REGION:-ID}
      - PROXY_RUNTIME_1024_USERNAME=${PROXY_RUNTIME_1024_USERNAME:-}
      - PROXY_RUNTIME_1024_PASSWORD=${PROXY_RUNTIME_1024_PASSWORD:-}
      - PROXY_RUNTIME_1024_SESSION_ID=${PROXY_RUNTIME_1024_SESSION_ID:-}
      - PROXY_RUNTIME_1024_STICKY_MINUTES=${PROXY_RUNTIME_1024_STICKY_MINUTES:-10}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  browser-automation:
    build:
      context: ../browser-automation
      dockerfile: Dockerfile
      args:
        CAMOUFOX_FETCH_PROXY: ${CAMOUFOX_FETCH_PROXY:-}
      extra_hosts:
        - "host.docker.internal:host-gateway"
    init: true
    ports:
      - "127.0.0.1:${BROWSER_AUTOMATION_GRPC_PORT:-50062}:50051"
    environment:
      - BROWSER_AUTOMATION_LISTEN_ADDR=:50051
      - BROWSER_AUTOMATION_POSTGRES_DSN=host=postgres user=${POSTGRES_USER:-byte_v_forge} password=${POSTGRES_PASSWORD:-byte_v_forge} dbname=${POSTGRES_DB:-byte_v_forge} port=5432 sslmode=disable
      - BROWSER_AUTOMATION_APPLY_MIGRATIONS=${BROWSER_AUTOMATION_APPLY_MIGRATIONS:-true}
      - BROWSER_AUTOMATION_RUNTIME=${BROWSER_AUTOMATION_RUNTIME:-camoufox}
      - BROWSER_AUTOMATION_PROXY_REFS_JSON=${BROWSER_AUTOMATION_PROXY_REFS_JSON:-{}}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: "2gb"
    depends_on:
      postgres:
        condition: service_started
    restart: always

  mailbox:
    build:
      context: ../mailbox
      dockerfile: Dockerfile
    init: true
    ports:
      - "${MAILBOX_GRPC_PORT:-50058}:50051"
      - "127.0.0.1:${MAILBOX_WEBHOOK_PORT:-8082}:8082"
    environment:
      - MAILBOX_LISTEN_ADDR=:50051
      - MAILBOX_WEBHOOK_HTTP_ADDR=:8082
      - MAILBOX_WEBHOOK_TOKEN=${MAILBOX_WEBHOOK_TOKEN:-}
      - MAILBOX_OUTBOUND_WEBHOOKS_FILE=/etc/mailbox/outbound-webhooks/webhooks.json
      - MAILBOX_CLOUDFLARE_EMAIL_CONFIG_FILE=/etc/mailbox/cloudflare-email/cloudflare-email.json
      - GPT_MAILBOX_WEBHOOK_TOKEN=${GPT_MAILBOX_WEBHOOK_TOKEN:-}
      - MAILBOX_CLOUDFLARE_API_TOKEN=${MAILBOX_CLOUDFLARE_API_TOKEN:-}
      - MAILBOX_CLOUDFLARE_MAX_MESSAGES_PER_DOMAIN=${MAILBOX_CLOUDFLARE_MAX_MESSAGES_PER_DOMAIN:-500}
      - MAILBOX_OUTLOOK_MAX_MESSAGES_PER_MAILBOX=${MAILBOX_OUTLOOK_MAX_MESSAGES_PER_MAILBOX:-100}
      - MAILBOX_PG_DSN=${MAILBOX_PG_DSN:-host=postgres user=${POSTGRES_USER:-byte_v_forge} password=${POSTGRES_PASSWORD:-byte_v_forge} dbname=${POSTGRES_DB:-byte_v_forge} port=5432 sslmode=disable}
      - BROWSER_AUTOMATION_ADDR=browser-automation:50051
      - WORKFLOW_RUNTIME_ADDRESS=workflow-runtime:7233
      - WORKFLOW_RUNTIME_NAMESPACE=${WORKFLOW_RUNTIME_NAMESPACE:-default}
      - WORKFLOW_RUNTIME_TASK_QUEUE=${MAILBOX_WORKFLOW_RUNTIME_TASK_QUEUE:-byte-v-forge-mailbox-service}
      - WORKFLOW_RUNTIME_IDENTITY=mailbox
    volumes:
      - ./mailbox/outbound-webhooks.compose.json:/etc/mailbox/outbound-webhooks/webhooks.json:ro
      - ./mailbox/cloudflare-email.compose.json:/etc/mailbox/cloudflare-email/cloudflare-email.json:ro
    depends_on:
      - postgres
      - browser-automation
      - workflow-runtime
    restart: always

  gpt-service:
    build:
      context: ../gpt
      dockerfile: gpt-service/Dockerfile
    init: true
    ports:
      - "${GPT_SERVICE_GRPC_PORT:-50055}:50051"
      - "127.0.0.1:${GPT_ACCOUNT_GRPC_PORT:-50052}:50052"
      - "127.0.0.1:${GPT_PAYMENT_GRPC_PORT:-50054}:50054"
      - "0.0.0.0:${GOPAY_WEBHOOK_PORT:-8081}:8081"
    environment:
      - GPT_SERVICE_LISTEN_ADDR=:50051
      - GPT_ACCOUNT_INTERNAL_ADDR=127.0.0.1:50052
      - GPT_GOPAY_PAYMENT_INTERNAL_ADDR=127.0.0.1:50054
      - GPT_GOPAY_APP_INTERNAL_PORT=50060
      - GPT_SERVICE_PG_DSN=host=postgres user=${POSTGRES_USER:-byte_v_forge} password=${POSTGRES_PASSWORD:-byte_v_forge} dbname=${POSTGRES_DB:-byte_v_forge} port=5432 sslmode=disable
      - BROWSER_AUTOMATION_ADDR=browser-automation:50051
      - SMS_ADDR=sms-service:50051
      - MAILBOX_ADDR=mailbox:50051
      - CODEX_OAUTH_CLIENT_ID=${CODEX_OAUTH_CLIENT_ID:-app_EMoamEEZ73f0CkXaXp7hrann}
      - CODEX_OAUTH_REDIRECT_URI=${CODEX_OAUTH_REDIRECT_URI:-http://localhost:1455/auth/callback}
      - CODEX_OAUTH_AUTH_URL=${CODEX_OAUTH_AUTH_URL:-https://auth.openai.com/oauth/authorize}
      - CODEX_OAUTH_TOKEN_URL=${CODEX_OAUTH_TOKEN_URL:-https://auth.openai.com/oauth/token}
      - CODEX_OAUTH_TOKEN_PROXY_URL=${CODEX_OAUTH_TOKEN_PROXY_URL:-socks5://proxy-runtime:10810}
      - CODEX_OAUTH_PROTOCOL_PROXY_URL=${CODEX_OAUTH_PROTOCOL_PROXY_URL:-socks5://proxy-runtime:10810}
      - CODEX_OAUTH_PROTOCOL_TLS_PROFILE=${CODEX_OAUTH_PROTOCOL_TLS_PROFILE:-chrome_146}
      - CODEX_OAUTH_PROTOCOL_SESSION_DUMP_ENABLED=${CODEX_OAUTH_PROTOCOL_SESSION_DUMP_ENABLED:-true}
      - CODEX_OAUTH_SCOPE=${CODEX_OAUTH_SCOPE:-openid profile email offline_access api.connectors.read api.connectors.invoke}
      - CODEX_OAUTH_PHONE_PROFILE_KEY=${CODEX_OAUTH_PHONE_PROFILE_KEY:-openai-th}
      - CODEX_OAUTH_PHONE_MAX_REUSE_COUNT=${CODEX_OAUTH_PHONE_MAX_REUSE_COUNT:-3}
      - CODEX_OAUTH_PHONE_LABEL=${CODEX_OAUTH_PHONE_LABEL:-codex-oauth-add-phone}
      - CODEX_OAUTH_PHONE_COUNTRY_ISO2=${CODEX_OAUTH_PHONE_COUNTRY_ISO2:-TH}
      - CODEX_OAUTH_PHONE_COUNTRY_CALLING_CODE=${CODEX_OAUTH_PHONE_COUNTRY_CALLING_CODE:-66}
      - CODEX_OAUTH_PHONE_MAX_PRICE_USD=${CODEX_OAUTH_PHONE_MAX_PRICE_USD:-0.068}
      - CODEX_OAUTH_PHONE_WAIT_SECONDS=${CODEX_OAUTH_PHONE_WAIT_SECONDS:-120}
      - CODEX_OAUTH_PHONE_MIN_REUSE_REMAINING_SECONDS=${CODEX_OAUTH_PHONE_MIN_REUSE_REMAINING_SECONDS:-180}
      - GPT_MAILBOX_WEBHOOK_TOKEN=${GPT_MAILBOX_WEBHOOK_TOKEN:-}
      - WORKFLOW_RUNTIME_ADDRESS=workflow-runtime:7233
      - WORKFLOW_RUNTIME_NAMESPACE=${WORKFLOW_RUNTIME_NAMESPACE:-default}
      - WORKFLOW_RUNTIME_TASK_QUEUE=${GPT_WORKFLOW_RUNTIME_TASK_QUEUE:-byte-v-forge-gpt-service}
      - WORKFLOW_RUNTIME_IDENTITY=gpt-service
      - GOPAY_DYNAMIC_EGRESS=${GOPAY_DYNAMIC_EGRESS:-socks5://proxy-runtime:10811}
      - 'GOPAY_CHECKOUT_PROFILE_JSON={"name":"checkout","proxy_url":"socks5://proxy-runtime:10812","tls_profile":"chrome_146","user_agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36","sec_ch_ua":"\"Google Chrome\";v=\"147\", \"Not.A/Brand\";v=\"8\", \"Chromium\";v=\"147\"","sec_ch_ua_platform":"\"Windows\"","locale":"en-US","platform":"Windows","pin_locale":"id"}'
      - 'GOPAY_PAYMENT_PROFILE_JSON={"name":"payment","proxy_url":"socks5://proxy-runtime:10810","tls_profile":"chrome_146","user_agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36","sec_ch_ua":"\"Google Chrome\";v=\"147\", \"Not.A/Brand\";v=\"8\", \"Chromium\";v=\"147\"","sec_ch_ua_platform":"\"Windows\"","locale":"zh-CN","platform":"Windows","pin_locale":"id"}'
      - PROXY_RUNTIME_HTTP_ADDR=${PROXY_RUNTIME_HTTP_ADDR:-http://proxy-runtime:8080}
      - GOPAY_SIGNUP_INITIATE_JITTER_MIN_SECONDS=${GOPAY_SIGNUP_INITIATE_JITTER_MIN_SECONDS:-8}
      - GOPAY_SIGNUP_INITIATE_JITTER_MAX_SECONDS=${GOPAY_SIGNUP_INITIATE_JITTER_MAX_SECONDS:-25}
      - GOPAY_SIGNUP_RATE_LIMIT_COOLDOWN_SECONDS=${GOPAY_SIGNUP_RATE_LIMIT_COOLDOWN_SECONDS:-900}
      - GOTO_SSO_CLIENT_SECRET=${GOTO_SSO_CLIENT_SECRET:-}
      - GOPAY_ADD_BALANCE_ENVELOPE_LINK=${GOPAY_ADD_BALANCE_ENVELOPE_LINK:-}
      - GOPAY_ADD_BALANCE_TRANSFER_INSTRUCTIONS=${GOPAY_ADD_BALANCE_TRANSFER_INSTRUCTIONS:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - browser-automation
      - mailbox
      - sms-service
      - workflow-runtime
      - proxy-runtime
    restart: always

  sms-service:
    build:
      context: ../sms
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${SMS_SERVICE_GRPC_PORT:-50061}:50051"
    environment:
      - SMS_LISTEN_ADDR=:50051
      - SMS_PG_DSN=host=postgres user=${POSTGRES_USER:-byte_v_forge} password=${POSTGRES_PASSWORD:-byte_v_forge} dbname=${POSTGRES_DB:-byte_v_forge} port=5432 sslmode=disable
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    restart: always

  webui:
    build:
      context: ..
      dockerfile: webui/Dockerfile
    ports:
      - "${WEBUI_PORT:-8080}:8080"
    environment:
      - LISTEN_ADDR=:8080
      - GPT_ACCOUNT_ADDR=gpt-service:50052
      - GPT_WORKFLOW_ADDR=gpt-service:50051
      - GPT_PAYMENT_ADDR=gpt-service:50054
      - MAILBOX_ADDR=mailbox:50051
      - SMS_ADDR=sms-service:50051
      - PROXY_RUNTIME_HTTP_ADDR=http://proxy-runtime:8080
      - DASHBOARD_SERVICE_STATUS_CONFIG_FILE=/etc/webui/dashboard/service-status.textproto
    volumes:
      - ./dashboard/service-status.compose.textproto:/etc/webui/dashboard/service-status.textproto:ro
    depends_on:
      - gpt-service
      - mailbox
      - sms-service
      - workflow-runtime
      - proxy-runtime
    restart: always

volumes:
  pgdata:
